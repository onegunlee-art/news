<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Hyundai Logo - Oval with stylized H -->
  <defs>
    <linearGradient id="hyundaiBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#002C5F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00274C;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle for profile display -->
  <circle cx="100" cy="100" r="100" fill="#ffffff"/>
  
  <!-- Outer oval -->
  <ellipse cx="100" cy="100" rx="85" ry="70" fill="none" stroke="url(#hyundaiBlue)" stroke-width="8"/>
  
  <!-- Stylized H - two figures shaking hands -->
  <path d="M 55 140 
           L 55 100 
           Q 55 70, 80 60 
           Q 100 55, 120 60 
           Q 145 70, 145 100 
           L 145 140" 
        fill="none" 
        stroke="url(#hyundaiBlue)" 
        stroke-width="8" 
        stroke-linecap="round"/>
  
  <!-- Connecting bar of H -->
  <path d="M 70 95 Q 100 80, 130 95" 
        fill="none" 
        stroke="url(#hyundaiBlue)" 
        stroke-width="8" 
        stroke-linecap="round"/>
</svg>
