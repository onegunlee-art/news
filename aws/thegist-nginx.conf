# ──────────────────────────────────────
# SEO: 봇 UA 화이트리스트 (검색엔진 + SNS 크롤러)
# map은 http {} 블록에 위치해야 하므로 server {} 앞에 배치.
# 이 파일을 sites-available/thegist 등으로 include 하는 경우,
# map 블록은 http {} 수준의 conf.d/ 파일로 분리하거나
# nginx.conf 내부에서 include 해야 합니다.
# ──────────────────────────────────────
map $http_user_agent $is_seo_bot {
    default 0;
    # ── 검색엔진 봇 (SEO 크롤링) ──
    ~*Googlebot               1;
    ~*Google-InspectionTool   1;
    ~*GoogleOther             1;
    ~*bingbot                 1;
    ~*Yeti                    1;   # Naver
    ~*Naverbot                1;
    # ── 소셜/메신저 봇 (OG 미리보기) ──
    ~*facebookexternalhit     1;
    ~*Facebot                 1;
    ~*Twitterbot              1;
    ~*LinkedInBot             1;
    ~*TelegramBot             1;
    ~*Slackbot                1;   # UA: Slackbot-LinkExpanding (사용자 앱과 구분됨)
    ~*WhatsApp                1;   # UA: WhatsApp/2.x (사용자 웹뷰와 구분됨)
    ~*discordbot              1;   # UA: Discordbot/2.0 (사용자 클라이언트와 구분됨)
    ~*Pinterest               1;
}

# ──────────────────────────────────────
# apex: HTTP (Let’s Encrypt challenge 후 www 로 301)
# ──────────────────────────────────────
server {
    listen 80;
    server_name thegist.co.kr;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/thegist/public;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://www.thegist.co.kr$request_uri;
    }
}

# ──────────────────────────────────────
# apex: HTTPS → www 표준 호스트
# ssl 경로는 certbot 인증서에 맞게 조정 (예: live/thegist.co.kr)
# ──────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name thegist.co.kr;

    ssl_certificate /etc/letsencrypt/live/thegist.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thegist.co.kr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://www.thegist.co.kr$request_uri;
}

# ──────────────────────────────────────
# www: HTTP → HTTPS (표준 URL, http/https 중복 방지)
# ──────────────────────────────────────
server {
    listen 80;
    server_name www.thegist.co.kr;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/thegist/public;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://www.thegist.co.kr$request_uri;
    }
}

# ──────────────────────────────────────
# 메인 앱: HTTP 직접 IP (SSL 없이 헬스·점검; 공개 트래픽은 HTTPS www 권장)
# ──────────────────────────────────────
server {
    listen 80;
    server_name 15.165.197.87;

    root /var/www/thegist/public;
    index index.html index.php;

    client_max_body_size 50M;
    charset utf-8;

    include /var/www/thegist/aws/thegist-server-locations.inc;
}

# ──────────────────────────────────────
# 메인 앱: HTTPS (443에 동일 include → Googlebot 봇 분기 동작)
# ssl* 은 certbot 과 일치하도록 서버에 맞게 수정
# ──────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name www.thegist.co.kr;

    ssl_certificate /etc/letsencrypt/live/thegist.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thegist.co.kr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/thegist/public;
    index index.html index.php;

    client_max_body_size 50M;
    charset utf-8;

    include /var/www/thegist/aws/thegist-server-locations.inc;
}

# ═══════════════════════════════════════════════════════════════════════════
# 적용·검증
#   sudo nginx -t && sudo systemctl reload nginx
#   curl -A "Googlebot" -sSI "https://www.thegist.co.kr/news/1"
#   curl -A "Googlebot" -sS "https://www.thegist.co.kr/news/1" | findstr canonical
#   curl -sSI "http://thegist.co.kr/news/1"   # → 301 https://www...
#   curl -sSI "https://www.thegist.co.kr/news/1/"  # → 301 .../news/1
#
# thegist-server-locations.inc 는 deploy.yml 로 /var/www/thegist/aws/ 에 동기화됩니다.
# certbot 이 별도 server 블록을 쓰는 경우, 443 server_name www 블록에
# 동일 include 경로를 넣어 주세요.
# ═══════════════════════════════════════════════════════════════════════════
