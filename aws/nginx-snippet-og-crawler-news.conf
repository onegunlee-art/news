# 기사 페이지 SEO + Open Graph: 봇 UA만 og-news-html.php 로 (SPA는 그대로 index.html)
# thegist-nginx.conf에 이미 map + location 포함됨.
# 이 파일은 참조용 스니펫이며, 실제 적용은 thegist-nginx.conf를 사용합니다.
#
# 적용 후: sudo nginx -t && sudo systemctl reload nginx
# 검증:
#   curl -A "Googlebot" -sS "https://www.thegist.co.kr/news/1" | head -40
#   curl -A "TelegramBot (like TwitterBot)" -sS "https://www.thegist.co.kr/news/1" | head -40
#   curl -A "Mozilla/5.0" -sS "https://www.thegist.co.kr/news/1" | head -10   # SPA index.html

