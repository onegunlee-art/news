# 기사 공유 링크 Open Graph: 크롤러 UA만 og-news-html.php 로 (SPA는 그대로 index.html)
# thegist.co.kr 서버 블록 안에 include 하거나, location 순서에 맞게 복사하세요.
#
# 적용 후: sudo nginx -t && sudo systemctl reload nginx
# 검증: curl -A "TelegramBot (like TwitterBot)" -sS "https://www.thegist.co.kr/news/1" | head -30

map $http_user_agent $og_news_crawler {
    default 0;
    ~*facebookexternalhit 1;
    ~*Facebot             1;
    ~*TelegramBot         1;
    ~*Twitterbot          1;
    ~*Slackbot            1;
    ~*LinkedInBot        1;
    ~*WhatsApp            1;
    ~*Pinterest           1;
    ~*discordbot          1;
}

