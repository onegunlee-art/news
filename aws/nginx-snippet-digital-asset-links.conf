# Nginx snippet: Digital Asset Links (TWA 도메인 검증)
# EC2에서 listen 443 ssl server { ... } 블록 안, location / 보다 위에 둘 것.
# 적용 예시:
#   sudo cp aws/nginx-snippet-digital-asset-links.conf /etc/nginx/snippets/thegist-digital-asset-links.conf
#   # 그리고 443 server 블록에:  include snippets/thegist-digital-asset-links.conf;
# 또는 아래 location 블록만 443 설정에 수동 복사.

location = /.well-known/assetlinks.json {
    default_type application/json;
    charset utf-8;
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    try_files $uri =404;
}
