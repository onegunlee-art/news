name: Build TWA AAB (Play)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Generate Android project from twa-manifest.json
        working-directory: android/twa
        run: bubblewrap update --manifest=. --skipVersionUpgrade

      - name: Decode Play upload keystore
        env:
          PLAY_UPLOAD_KEYSTORE_BASE64: ${{ secrets.PLAY_UPLOAD_KEYSTORE_BASE64 }}
        run: |
          echo "$PLAY_UPLOAD_KEYSTORE_BASE64" | base64 -d > "${RUNNER_TEMP}/upload.keystore"

      - name: Build signed AAB
        working-directory: android/twa
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.PLAY_KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.PLAY_KEY_PASSWORD }}
          UPLOAD_KEYSTORE: ${{ runner.temp }}/upload.keystore
        run: |
          bubblewrap build \
            --manifest=. \
            --signingKeyPath="${UPLOAD_KEYSTORE}" \
            --signingKeyAlias="${{ secrets.PLAY_KEY_ALIAS }}" \
            --skipPwaValidation

      - name: List AAB outputs (logs)
        working-directory: android/twa
        run: find app/build/outputs -name '*.aab' -ls

      - uses: actions/upload-artifact@v4
        with:
          name: twa-release-aab
          path: android/twa/app/build/outputs/bundle/**/*.aab
