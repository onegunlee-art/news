name: Build TWA AAB (Play)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # Bubblewrap 최신 템플릿은 compileSdk 36 — 플랫폼·빌드 도구 없으면 Gradle이 바로 실패(exit 1)
      - uses: android-actions/setup-android@v4
        with:
          packages: "tools platform-tools platforms;android-36 build-tools;36.0.0"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      # @bubblewrap/core은 apksigner 경로를 build-tools 34.0.0으로 고정함.
      # CI JDK를 21로 올렸으므로 PKCS12 "Tag number over 30" 문제는 해소되지만,
      # Bubblewrap이 설치되지 않은 34.0.0 경로를 참조하면 FileNotFound로 실패하므로 36.0.0에 맞춤.
      - name: Patch Bubblewrap BUILD_TOOLS_VERSION for apksigner
        run: |
          F="$(find "$(npm root -g)" -path '*/@bubblewrap/core/dist/lib/androidSdk/AndroidSdkTools.js' 2>/dev/null | head -n1)"
          test -n "$F" && test -f "$F"
          sed -i "s/exports\.BUILD_TOOLS_VERSION = '34\.0\.0'/exports.BUILD_TOOLS_VERSION = '36.0.0'/" "$F"
          grep "BUILD_TOOLS_VERSION" "$F" | head -n1

      # 러너에 ~/.bubblewrap/config.json 이 없으면 Bubblewrap이 JDK/SDK 설치를 묻는
      # 대화형 프롬프트에서 멈출 수 있음(취소 시 exit 130). CI에서는 비대화형으로 고정.
      - name: Write Bubblewrap config (non-interactive)
        run: |
          mkdir -p "${HOME}/.bubblewrap"
          SDK="${ANDROID_SDK_ROOT:-${ANDROID_HOME}}"
          printf '%s\n' "{\"jdkPath\":\"${JAVA_HOME}\",\"androidSdkPath\":\"${SDK}\"}" > "${HOME}/.bubblewrap/config.json"
          cat "${HOME}/.bubblewrap/config.json"

      # --manifest=. 는 디렉터리가 아니라 twa-manifest.json *파일* 경로로 쓰여 EISDIR 발생
      - name: Generate Android project from twa-manifest.json
        working-directory: android/twa
        run: bubblewrap update --skipVersionUpgrade

      # 4개 시크릿 중 하나라도 비어 있으면 빌드가 "초록불로 미서명 AAB"를 만드는 현상을 막는다.
      - name: Assert Play signing secrets are set
        env:
          PLAY_KEYSTORE_BASE64: ${{ secrets.PLAY_KEYSTORE_BASE64 }}
          PLAY_KEYSTORE_PASSWORD: ${{ secrets.PLAY_KEYSTORE_PASSWORD }}
          PLAY_KEY_PASSWORD: ${{ secrets.PLAY_KEY_PASSWORD }}
          PLAY_KEY_ALIAS: ${{ secrets.PLAY_KEY_ALIAS }}
        shell: bash
        run: |
          set -eu
          missing=0
          for v in PLAY_KEYSTORE_BASE64 PLAY_KEYSTORE_PASSWORD PLAY_KEY_PASSWORD PLAY_KEY_ALIAS; do
            if [ -z "${!v:-}" ]; then
              echo "::error::Secret $v is empty. Register it in repo Settings → Secrets and variables → Actions."
              missing=$((missing + 1))
            else
              echo "OK: $v is set"
            fi
          done
          if [ "$missing" -gt 0 ]; then
            exit 1
          fi

      - name: Decode Play upload keystore
        env:
          PLAY_KEYSTORE_BASE64: ${{ secrets.PLAY_KEYSTORE_BASE64 }}
        shell: bash
        run: |
          set -euo pipefail
          # BOM/개행 등을 제거한 뒤 디코드. 실패 시 즉시 종료.
          printf '%s' "$PLAY_KEYSTORE_BASE64" | tr -d '\r\n ' | base64 -d > "${RUNNER_TEMP}/upload.keystore"
          if [ ! -s "${RUNNER_TEMP}/upload.keystore" ]; then
            echo "::error::Decoded keystore is empty. PLAY_KEYSTORE_BASE64 may be blank or malformed."
            exit 1
          fi
          echo "Keystore decoded: $(wc -c < "${RUNNER_TEMP}/upload.keystore") bytes"

      - name: Verify decoded keystore (alias + password must match)
        env:
          PLAY_KEYSTORE_PASSWORD: ${{ secrets.PLAY_KEYSTORE_PASSWORD }}
          PLAY_KEY_ALIAS: ${{ secrets.PLAY_KEY_ALIAS }}
        shell: bash
        run: |
          set -euo pipefail
          # 파이프를 쓰면 keytool 실패가 묻히므로 직접 실행.
          keytool -list -v \
            -keystore "${RUNNER_TEMP}/upload.keystore" \
            -storepass "${PLAY_KEYSTORE_PASSWORD}" \
            -alias "${PLAY_KEY_ALIAS}"

      - name: Build signed AAB
        working-directory: android/twa
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.PLAY_KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.PLAY_KEY_PASSWORD }}
          UPLOAD_KEYSTORE: ${{ runner.temp }}/upload.keystore
          PLAY_KEY_ALIAS: ${{ secrets.PLAY_KEY_ALIAS }}
        shell: bash
        run: |
          set -euo pipefail
          bubblewrap build \
            --signingKeyPath="${UPLOAD_KEYSTORE}" \
            --signingKeyAlias="${PLAY_KEY_ALIAS}" \
            --skipPwaValidation

      - name: List AAB outputs (logs)
        working-directory: android/twa
        run: find app/build/outputs -name '*.aab' -ls

      # 산출물이 실제로 서명되었는지 강제 검증. 미서명이면 여기서 실패시켜 Artifact 업로드 방지.
      - name: Assert AAB is signed
        working-directory: android/twa
        shell: bash
        run: |
          set -euo pipefail
          AAB="$(find app/build/outputs -name '*.aab' | head -n1)"
          if [ -z "$AAB" ]; then
            echo "::error::No AAB produced."
            exit 1
          fi
          echo "Verifying: $AAB"
          jarsigner -verify -verbose:summary "$AAB"
          if ! jarsigner -verify "$AAB" 2>&1 | grep -q 'jar verified'; then
            echo "::error::AAB is NOT signed. Check PLAY_KEYSTORE_PASSWORD / PLAY_KEY_PASSWORD / PLAY_KEY_ALIAS."
            exit 1
          fi
          echo "OK: AAB signature verified."

      - uses: actions/upload-artifact@v4
        with:
          name: twa-release-aab
          path: android/twa/app/build/outputs/bundle/**/*.aab
