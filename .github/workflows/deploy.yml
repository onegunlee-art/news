name: Build and Deploy
# 배포는 main 브랜치에 push할 때만 실행됩니다. 변경사항이 반영되려면 반드시 main에 push하세요.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PHP_VERSION: '8.2'
  # GitHub Actions: Node 24 기본 전환 대비 (checkout/setup-node 경고 완화)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ========================================
  # 백엔드 테스트
  # ========================================
  test-backend:
    name: Test Backend (PHP)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pdo_mysql, curl, json, mbstring
          coverage: none

      - name: Validate PHP syntax
        run: |
          echo "Validating PHP syntax..."
          failed=0
          for file in $(find src/backend src/agents -name "*.php" 2>/dev/null); do
            if ! php -l "$file" > /dev/null 2>&1; then
              echo "❌ Syntax error in: $file"
              php -l "$file"
              failed=1
            else
              echo "✅ $file"
            fi
          done
          if [ $failed -eq 1 ]; then
            echo "PHP syntax validation failed"
            exit 1
          fi
          echo "All PHP files validated successfully"

      - name: Check PHP files
        run: |
          echo "PHP files validated successfully"

  # ========================================
  # 프론트엔드 빌드
  # ========================================
  build-frontend:
    name: Build Frontend (React)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Build for production
        working-directory: src/frontend
        run: npm run build
        env:
          VITE_API_URL: /api

      - name: List built files (배포될 프론트엔드 파일 확인)
        run: |
          echo "=== public/ 내용 (배포 대상) ==="
          ls -la public/
          ls -la public/assets/ 2>/dev/null || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: public/
          retention-days: 7

  # ========================================
  # SSH 배포 (AWS EC2)
  # ========================================
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: public/

      - name: Verify deploy package
        run: |
          echo "=== 배포 패키지 확인 ==="
          test -f public/index.html && echo "OK: index.html" || echo "WARN: index.html 없음"
          test -f public/api.php && echo "OK: api.php" || echo "WARN: api.php 없음"
          ls public/assets/ 2>/dev/null | head -5 || true

      - name: Setup SSH key
        run: |
          mkdir -p "$HOME/.ssh"
          # PEM은 Windows에서 붙여넣을 때 CRLF가 섞이면 ssh가 255로 실패함
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" | tr -d '\r' > "$HOME/.ssh/ec2_key"
          chmod 600 "$HOME/.ssh/ec2_key"
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> "$HOME/.ssh/known_hosts" 2>/dev/null || true

      # Post-deploy에서 www-data로 두기 전, 이전 배포가 www-data 소유면
      # ubuntu가 rsync --delete 시 삭제/덮어쓰기 못 해 exit code 23 발생함
      - name: Prepare remote ownership for rsync
        run: |
          REMOTE="${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}"
          KEY="$HOME/.ssh/ec2_key"
          ssh -i "$KEY" -o StrictHostKeyChecking=no "$REMOTE" bash -c '
            set -e
            U=$(whoami)
            for d in /var/www/thegist/public \
                     /var/www/thegist/src/backend \
                     /var/www/thegist/src/agents \
                     /var/www/thegist/config \
                     /var/www/thegist/database; do
              if [ -d "$d" ]; then
                sudo chown -R "$U:$U" "$d"
              fi
            done
            echo "Remote deploy dirs chowned to $U"
          '

      - name: Deploy via rsync
        run: |
          REMOTE="${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}"
          KEY="$HOME/.ssh/ec2_key"
          DEST="/var/www/thegist"

          rsync -avz --delete \
            --exclude='.git*' \
            --exclude='node_modules/' \
            --exclude='storage/audio/' \
            --exclude='storage/thumbnails/' \
            --exclude='storage/cache/' \
            --exclude='storage/logs/' \
            --exclude='.env' \
            --exclude='env.txt' \
            --exclude='env_loader.php' \
            --exclude='config/database.php' \
            -e "ssh -i $KEY -o StrictHostKeyChecking=no" \
            public/ "$REMOTE:$DEST/public/"

          rsync -avz \
            -e "ssh -i $KEY -o StrictHostKeyChecking=no" \
            src/backend/ "$REMOTE:$DEST/src/backend/"

          rsync -avz \
            -e "ssh -i $KEY -o StrictHostKeyChecking=no" \
            src/agents/ "$REMOTE:$DEST/src/agents/"

          rsync -avz \
            --exclude='database.php' \
            -e "ssh -i $KEY -o StrictHostKeyChecking=no" \
            config/ "$REMOTE:$DEST/config/"

          rsync -avz \
            -e "ssh -i $KEY -o StrictHostKeyChecking=no" \
            database/ "$REMOTE:$DEST/database/"

      # Nginx config는 서버에서 직접 관리 (certbot SSL 블록 포함).
      # sw.js/registerSW.js no-cache 블록만 없으면 추가한다.
      - name: Ensure sw.js no-cache in Nginx config
        run: |
          REMOTE="${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}"
          KEY="$HOME/.ssh/ec2_key"
          CHECK=$(ssh -i "$KEY" -o StrictHostKeyChecking=no "$REMOTE" \
            'grep -c registerSW /etc/nginx/sites-available/thegist 2>/dev/null || echo 0')
          CHECK=$(echo "$CHECK" | tr -d '[:space:]')
          if [ "$CHECK" != "0" ]; then
            echo "sw.js no-cache block already present — skipping"
            exit 0
          fi
          echo "Adding sw.js no-cache block to Nginx config..."
          printf '%s\n' \
            '    # SW/PWA: no-cache (auto-added by CI)' \
            '    location ~* ^/(sw|registerSW)\.js$ {' \
            '        expires -1;' \
            '        add_header Cache-Control "no-cache, no-store, must-revalidate";' \
            '        add_header Pragma "no-cache";' \
            '        try_files $uri =404;' \
            '    }' \
            '    location = /manifest.webmanifest {' \
            '        expires -1;' \
            '        add_header Cache-Control "no-cache, no-store, must-revalidate";' \
            '        try_files $uri =404;' \
            '    }' > /tmp/sw-snippet.conf
          scp -i "$KEY" -o StrictHostKeyChecking=no /tmp/sw-snippet.conf "$REMOTE:/tmp/"
          ssh -i "$KEY" -o StrictHostKeyChecking=no "$REMOTE" \
            'CONF=/etc/nginx/sites-available/thegist && sudo awk "/location ~\* \\\\\./{while((getline line < \"/tmp/sw-snippet.conf\") > 0) print line; close(\"/tmp/sw-snippet.conf\")} {print}" "$CONF" | sudo tee /tmp/thegist-patched > /dev/null && sudo cp /tmp/thegist-patched "$CONF" && sudo nginx -t && sudo systemctl reload nginx && echo "sw.js no-cache block added and nginx reloaded"'

      - name: Post-deploy tasks
        run: |
          REMOTE="${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}"
          KEY="$HOME/.ssh/ec2_key"
          ssh -i "$KEY" -o StrictHostKeyChecking=no "$REMOTE" "
            sudo chown -R www-data:www-data /var/www/thegist/
            sudo chmod -R 755 /var/www/thegist/
            sudo chmod -R 775 /var/www/thegist/storage/
            sudo ln -sf /var/www/thegist/storage /var/www/thegist/public/storage
            sudo systemctl restart php8.2-fpm
            echo 'Deploy complete: PHP-FPM restarted'
          "

      - name: Deployment notification
        run: |
          echo "Deployment completed successfully!"
          echo "Site URL: https://www.thegist.co.kr"

  # ========================================
  # 배포 후 검증 (실패 시 워크플로우 실패)
  # ========================================
  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      SITE_URL: https://www.thegist.co.kr

    steps:
      - name: Wait for deployment
        run: sleep 20

      # curl -w "%{http_code}"는 연결 실패 시에도 000을 stdout에 씀.
      # 여기에 || echo "000"을 붙이면 000000처럼 이어붙어 실패 메시지가 왜곡됨.
      - name: Health check (retries)
        run: |
          BASE="${{ env.SITE_URL }}"
          URL="$BASE/api/health"
          last=""
          for i in $(seq 1 12); do
            last=$(curl -sS -o /dev/null -w "%{http_code}" --connect-timeout 20 --max-time 45 "$URL" 2>/dev/null) || true
            last=$(echo "$last" | tr -d '[:space:]')
            if [ "$last" = "200" ]; then
              echo "✅ Health check passed (attempt $i): $URL"
              exit 0
            fi
            echo "Attempt $i/12: HTTP ${last:-<empty>} — retry in 15s..."
            sleep 15
          done
          echo "❌ Health check failed after 12 attempts. Last HTTP code: ${last:-none}"
          echo "--- curl -I (debug) ---"
          curl -sSI --connect-timeout 15 --max-time 30 "$URL" || true
          exit 1

      - name: Check homepage (retries)
        run: |
          URL="${{ env.SITE_URL }}/"
          last=""
          for i in $(seq 1 8); do
            last=$(curl -sS -o /dev/null -w "%{http_code}" --connect-timeout 20 --max-time 45 "$URL" 2>/dev/null) || true
            last=$(echo "$last" | tr -d '[:space:]')
            if [ "$last" = "200" ]; then
              echo "✅ Homepage OK (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/8: HTTP ${last:-<empty>} — retry in 10s..."
            sleep 10
          done
          echo "❌ Homepage failed. Last HTTP: ${last:-none}"
          curl -sSI --connect-timeout 15 --max-time 30 "$URL" || true
          exit 1
