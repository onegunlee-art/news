name: Build and Deploy
# 배포는 main 브랜치에 push할 때만 실행됩니다. 변경사항이 반영되려면 반드시 main에 push하세요.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PHP_VERSION: '8.4'

jobs:
  # ========================================
  # 백엔드 테스트
  # ========================================
  test-backend:
    name: Test Backend (PHP)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pdo_mysql, curl, json, mbstring
          coverage: none

      - name: Validate PHP syntax
        run: |
          echo "Validating PHP syntax..."
          failed=0
          for file in $(find src/backend src/agents -name "*.php" 2>/dev/null); do
            if ! php -l "$file" > /dev/null 2>&1; then
              echo "❌ Syntax error in: $file"
              php -l "$file"
              failed=1
            else
              echo "✅ $file"
            fi
          done
          if [ $failed -eq 1 ]; then
            echo "PHP syntax validation failed"
            exit 1
          fi
          echo "All PHP files validated successfully"

      - name: Check PHP files
        run: |
          echo "PHP files validated successfully"

  # ========================================
  # 프론트엔드 빌드
  # ========================================
  build-frontend:
    name: Build Frontend (React)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Build for production
        working-directory: src/frontend
        run: npm run build
        env:
          VITE_API_URL: /api

      - name: List built files (배포될 프론트엔드 파일 확인)
        run: |
          echo "=== public/ 내용 (배포 대상) ==="
          ls -la public/
          ls -la public/assets/ 2>/dev/null || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: public/
          retention-days: 7

  # ========================================
  # FTP 배포 (dothome)
  # ========================================
  deploy:
    name: Deploy to dothome
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: public/

      - name: Verify deploy package
        run: |
          echo "=== 배포 패키지에 포함될 항목 ==="
          ls -la public/
          test -f public/index.html && echo "OK: index.html 있음" || echo "WARN: index.html 없음"
          test -f public/api.php && echo "OK: api.php 있음" || echo "WARN: api.php 없음"
          test -f public/api/admin/news.php && echo "OK: api/admin/news.php 있음" || echo "WARN: api/admin/news.php 없음"
          test -f public/.htaccess && echo "OK: .htaccess 있음" || echo "WARN: .htaccess 없음"
          ls public/assets/ 2>/dev/null | head -5 || true

      - name: Create deployment package
        run: |
          # 배포에 필요한 파일들만 선택
          mkdir -p deploy
          
          # Public 폴더 (프론트엔드 빌드 + PHP 진입점)
          cp -r public/* deploy/
          # dotfile 복사 (*는 .htaccess 등 dotfile 미포함)
          cp public/.htaccess deploy/ 2>/dev/null || true
          
          # Config 폴더
          mkdir -p deploy/config
          cp config/*.php deploy/config/ 2>/dev/null || true
          
          # Backend 소스
          mkdir -p deploy/src/backend
          cp -r src/backend/* deploy/src/backend/
          
          # Agents 소스 (AI 분석 시스템)
          mkdir -p deploy/src/agents
          cp -r src/agents/* deploy/src/agents/
          
          # Storage 폴더 (학습 데이터용)
          mkdir -p deploy/storage/learning
          mkdir -p deploy/storage/audio
          mkdir -p deploy/storage/thumbnails
          
          # Database 스키마, 마이그레이션, 시드
          mkdir -p deploy/database
          cp database/schema.sql deploy/database/
          mkdir -p deploy/database/migrations
          cp database/migrations/*.sql deploy/database/migrations/ 2>/dev/null || true
          mkdir -p deploy/database/seeds
          cp database/seeds/*.json deploy/database/seeds/ 2>/dev/null || true
          
          # 불필요한 파일 제거
          find deploy -name "*.md" -delete 2>/dev/null || true
          find deploy -name ".git*" ! -name ".htaccess" -delete 2>/dev/null || true
          
          # .htaccess 배포 보장 (재복사)
          cp public/.htaccess deploy/.htaccess 2>/dev/null || true
          echo "=== .htaccess 배포 확인 ==="
          test -f deploy/.htaccess && echo "OK: .htaccess 포함됨 ($(wc -l < deploy/.htaccess) lines)" || echo "CRITICAL: .htaccess 누락!"

      - name: Create .env and env.txt from GitHub Secrets
        run: |
          # env.txt = dotfile이 아닌 일반 파일 (FTP에서 누락될 수 있는 .env 대비)
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" > deploy/env.txt
          echo "GOOGLE_TTS_API_KEY=${{ secrets.GOOGLE_TTS_API_KEY }}" >> deploy/env.txt
          if [ -n "${{ secrets.ANTHROPIC_API_KEY }}" ]; then echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> deploy/env.txt; fi
          # Supabase (선택): 피드백/이론 라이브러리 사용 시 추가
          if [ -n "${{ secrets.SUPABASE_URL }}" ]; then echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> deploy/env.txt; fi
          if [ -n "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" ]; then echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" >> deploy/env.txt; fi
          # StepPay 구독 결제
          if [ -n "${{ secrets.STEPPAY_SECRET_TOKEN }}" ]; then echo "STEPPAY_SECRET_TOKEN=${{ secrets.STEPPAY_SECRET_TOKEN }}" >> deploy/env.txt; fi
          if [ -n "${{ secrets.STEPPAY_PAYMENT_KEY }}" ]; then echo "STEPPAY_PAYMENT_KEY=${{ secrets.STEPPAY_PAYMENT_KEY }}" >> deploy/env.txt; fi
          # Google OAuth 로그인
          if [ -n "${{ secrets.GOOGLE_CLIENT_ID }}" ]; then echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> deploy/env.txt; fi
          if [ -n "${{ secrets.GOOGLE_CLIENT_SECRET }}" ]; then echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> deploy/env.txt; fi
          if [ -n "${{ secrets.GOOGLE_REDIRECT_URI }}" ]; then echo "GOOGLE_REDIRECT_URI=${{ secrets.GOOGLE_REDIRECT_URI }}" >> deploy/env.txt; fi
          # Resend 이메일 인증
          if [ -n "${{ secrets.RESEND_API_KEY }}" ]; then echo "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" >> deploy/env.txt; fi
          if [ -n "${{ secrets.MAIL_FROM_ADDRESS }}" ]; then echo "MAIL_FROM_ADDRESS=${{ secrets.MAIL_FROM_ADDRESS }}" >> deploy/env.txt; fi
          if [ -n "${{ secrets.MAIL_FROM_NAME }}" ]; then echo "MAIL_FROM_NAME=${{ secrets.MAIL_FROM_NAME }}" >> deploy/env.txt; fi
          # .env 도 생성 (이중 안전)
          cp deploy/env.txt deploy/.env
          echo "# Auto-generated by GitHub Actions" >> deploy/.env
          echo "✅ env.txt and .env created"
          if [ -n "${{ secrets.OPENAI_API_KEY }}" ]; then
            echo "  OPENAI_API_KEY: SET"
          else
            echo "  ⚠️ OPENAI_API_KEY: NOT SET"
          fi
          if [ -n "${{ secrets.GOOGLE_TTS_API_KEY }}" ]; then
            echo "  GOOGLE_TTS_API_KEY: SET"
          else
            echo "  ⚠️ GOOGLE_TTS_API_KEY: NOT SET"
          fi
          if [ -n "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "  ANTHROPIC_API_KEY: SET"
          else
            echo "  ⚠️ ANTHROPIC_API_KEY: NOT SET"
          fi
          ls -la deploy/env.txt deploy/.env 2>/dev/null || true

      - name: Clean remote assets via FTP
        run: |
          lftp -c "
            open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }};
            rm -rf /html/assets/;
            mkdir -p /html/assets/;
            bye
          " || echo "Remote assets cleanup skipped (non-critical)"

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy/
          server-dir: /html/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/README.md
            storage/thumbnails/**
            storage/audio/**

      - name: Deployment notification
        run: |
          echo "✅ Deployment completed successfully!"
          echo "🌐 Site URL: https://www.thegist.co.kr"

  # ========================================
  # 배포 후 검증 (실패 시 워크플로우 실패)
  # ========================================
  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      SITE_URL: https://www.thegist.co.kr

    steps:
      - name: Wait for deployment
        run: sleep 30

      - name: Health check
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.SITE_URL }}/api/health" || echo "000")
          if [ "$response" = "200" ]; then
            echo "✅ Health check passed"
          else
            echo "❌ Health check returned: $response (expected 200)"
            exit 1
          fi

      - name: Check homepage
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.SITE_URL }}/" || echo "000")
          if [ "$response" = "200" ]; then
            echo "✅ Homepage accessible"
          else
            echo "❌ Homepage returned: $response (expected 200)"
            exit 1
          fi
