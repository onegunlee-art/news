name: Build and Deploy
# 배포는 main 브랜치에 push할 때만 실행됩니다. 변경사항이 반영되려면 반드시 main에 push하세요.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PHP_VERSION: '8.2'
  # GitHub Actions: Node 24 기본 전환 대비 (checkout/setup-node 경고 완화)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ========================================
  # 백엔드 테스트
  # ========================================
  test-backend:
    name: Test Backend (PHP)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pdo_mysql, curl, json, mbstring
          coverage: none

      # test.yml과 동일: 저장소 전체 *.php (vendor 제외). public/api 등 포함.
      - name: Validate PHP syntax
        run: |
          echo "Validating PHP syntax (all repo, exclude vendor)..."
          errors=0
          while IFS= read -r file; do
            if ! php -l "$file" > /dev/null 2>&1; then
              echo "❌ Syntax error in: $file"
              php -l "$file"
              errors=$((errors + 1))
            fi
          done < <(find . -name "*.php" -not -path "./vendor/*")
          if [ "$errors" -gt 0 ]; then
            echo "Found $errors file(s) with syntax errors"
            exit 1
          fi
          echo "All PHP files have valid syntax"

      - name: Check PHP files
        run: |
          echo "PHP syntax check passed (aligned with .github/workflows/test.yml)"

  # ========================================
  # 프론트엔드 빌드
  # ========================================
  build-frontend:
    name: Build Frontend (React)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Build for production
        working-directory: src/frontend
        run: npm run build
        env:
          VITE_API_URL: /api

      - name: List built files (배포될 프론트엔드 파일 확인)
        run: |
          echo "=== public/ 내용 (배포 대상) ==="
          ls -la public/
          ls -la public/assets/ 2>/dev/null || true
          echo "=== public/.well-known (TWA assetlinks 등) ==="
          ls -la public/.well-known/ 2>/dev/null || echo "WARN: public/.well-known 없음"
          test -f public/.well-known/assetlinks.json && echo "OK: assetlinks.json in artifact" || echo "WARN: assetlinks.json 없음 — 레포 public/.well-known 커밋 여부 확인"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: public/
          retention-days: 7

  # ========================================
  # SSH 배포 (AWS EC2)
  # ========================================
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: public/

      - name: Verify deploy package
        run: |
          echo "=== 배포 패키지 확인 ==="
          test -f public/index.html && echo "OK: index.html" || echo "WARN: index.html 없음"
          test -f public/api.php && echo "OK: api.php" || echo "WARN: api.php 없음"
          ls public/assets/ 2>/dev/null | head -5 || true
          test -f public/.well-known/assetlinks.json && echo "OK: .well-known/assetlinks.json" || echo "WARN: assetlinks.json 없음"

      - name: Setup SSH key
        run: |
          mkdir -p "$HOME/.ssh"
          # PEM은 Windows에서 붙여넣을 때 CRLF가 섞이면 ssh가 255로 실패함
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" | tr -d '\r' > "$HOME/.ssh/ec2_key"
          chmod 600 "$HOME/.ssh/ec2_key"
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> "$HOME/.ssh/known_hosts" 2>/dev/null || true

      # Post-deploy에서 www-data로 두기 전, 이전 배포가 www-data 소유면
      # ubuntu가 rsync --delete 시 삭제/덮어쓰기 못 해 exit code 23 발생함
      - name: Prepare remote ownership for rsync
        run: |
          REMOTE="${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}"
          KEY="$HOME/.ssh/ec2_key"
          ssh -i "$KEY" -o StrictHostKeyChecking=no "$REMOTE" bash -c '
            set -e
            U=$(whoami)
            for d in /var/www/thegist/public \
                     /var/www/thegist/src/backend \
                     /var/www/thegist/src/agents \
                     /var/www/thegist/config \
                     /var/www/thegist/database; do
              if [ -d "$d" ]; then
                sudo chown -R "$U:$U" "$d"
              fi
            done
            echo "Remote deploy dirs chowned to $U"
          '

      - name: Deploy via rsync
        run: |
          REMOTE="${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}"
          KEY="$HOME/.ssh/ec2_key"
          DEST="/var/www/thegist"

          rsync -avz --delete \
            --exclude='.git*' \
            --exclude='node_modules/' \
            --exclude='storage/audio/' \
            --exclude='storage/thumbnails/' \
            --exclude='storage/cache/' \
            --exclude='storage/logs/' \
            --exclude='.env' \
            --exclude='env.txt' \
            --exclude='env_loader.php' \
            --exclude='config/database.php' \
            -e "ssh -i $KEY -o StrictHostKeyChecking=no" \
            public/ "$REMOTE:$DEST/public/"

          rsync -avz \
            -e "ssh -i $KEY -o StrictHostKeyChecking=no" \
            src/backend/ "$REMOTE:$DEST/src/backend/"

          rsync -avz \
            -e "ssh -i $KEY -o StrictHostKeyChecking=no" \
            src/agents/ "$REMOTE:$DEST/src/agents/"

          rsync -avz \
            --exclude='database.php' \
            -e "ssh -i $KEY -o StrictHostKeyChecking=no" \
            config/ "$REMOTE:$DEST/config/"

          rsync -avz \
            -e "ssh -i $KEY -o StrictHostKeyChecking=no" \
            database/ "$REMOTE:$DEST/database/"

          rsync -avz \
            -e "ssh -i $KEY -o StrictHostKeyChecking=no" \
            aws/thegist-server-locations.inc "$REMOTE:$DEST/aws/"

      # Nginx config는 서버에서 직접 관리 (certbot SSL 블록 포함).
      # sw.js/registerSW.js no-cache 블록만 없으면 추가한다.
      - name: Ensure sw.js no-cache in Nginx config
        run: |
          REMOTE="${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}"
          KEY="$HOME/.ssh/ec2_key"
          CHECK=$(ssh -i "$KEY" -o StrictHostKeyChecking=no "$REMOTE" \
            'grep -c registerSW /etc/nginx/sites-available/thegist 2>/dev/null || echo 0')
          CHECK=$(echo "$CHECK" | tr -d '[:space:]')
          if [ "$CHECK" != "0" ]; then
            echo "sw.js no-cache block already present — skipping"
            exit 0
          fi
          echo "Adding sw.js no-cache block to Nginx config..."
          printf '%s\n' \
            '    # SW/PWA: no-cache (auto-added by CI)' \
            '    location ~* ^/(sw|registerSW)\.js$ {' \
            '        expires -1;' \
            '        add_header Cache-Control "no-cache, no-store, must-revalidate";' \
            '        add_header Pragma "no-cache";' \
            '        try_files $uri =404;' \
            '    }' \
            '    location = /manifest.webmanifest {' \
            '        expires -1;' \
            '        add_header Cache-Control "no-cache, no-store, must-revalidate";' \
            '        try_files $uri =404;' \
            '    }' > /tmp/sw-snippet.conf
          scp -i "$KEY" -o StrictHostKeyChecking=no /tmp/sw-snippet.conf "$REMOTE:/tmp/"
          ssh -i "$KEY" -o StrictHostKeyChecking=no "$REMOTE" \
            'CONF=/etc/nginx/sites-available/thegist && sudo awk "/location ~\* \\\\\./{while((getline line < \"/tmp/sw-snippet.conf\") > 0) print line; close(\"/tmp/sw-snippet.conf\")} {print}" "$CONF" | sudo tee /tmp/thegist-patched > /dev/null && sudo cp /tmp/thegist-patched "$CONF" && sudo nginx -t && sudo systemctl reload nginx && echo "sw.js no-cache block added and nginx reloaded"'

      # index.html no-cache: sed 멀티라인은 YAML run:| 들여쓰기와 충돌하므로 sw 스텝과 동일하게 snippet+awk 사용
      - name: Ensure index.html no-cache in Nginx
        run: |
          REMOTE="${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}"
          KEY="$HOME/.ssh/ec2_key"
          HAS=$(ssh -i "$KEY" -o StrictHostKeyChecking=no "$REMOTE" \
            'grep -c "location = /index.html" /etc/nginx/sites-available/thegist 2>/dev/null || echo 0')
          HAS=$(echo "$HAS" | tr -d '[:space:]')
          if [ "$HAS" != "0" ]; then
            echo "index.html no-cache block already present — skipping"
            exit 0
          fi
          echo "Adding index.html no-cache block to Nginx config..."
          printf '%s\n' \
            '    # ──────────────────────────────────────' \
            '    # SPA 엔트리 HTML: 항상 재검증 (구버전 번들 참조 방지) (auto-added by CI)' \
            '    # ──────────────────────────────────────' \
            '    location = /index.html {' \
            '        expires -1;' \
            '        add_header Cache-Control "no-cache, no-store, must-revalidate" always;' \
            '        add_header Pragma "no-cache" always;' \
            '    }' \
            '' > /tmp/index-html-snippet.conf
          scp -i "$KEY" -o StrictHostKeyChecking=no /tmp/index-html-snippet.conf "$REMOTE:/tmp/"
          ssh -i "$KEY" -o StrictHostKeyChecking=no "$REMOTE" \
            'CONF=/etc/nginx/sites-available/thegist && sudo awk "/# 정적 파일 캐시/{while((getline line < \"/tmp/index-html-snippet.conf\") > 0) print line; close(\"/tmp/index-html-snippet.conf\")} {print}" "$CONF" | sudo tee /tmp/thegist-index-patched > /dev/null && sudo cp /tmp/thegist-index-patched "$CONF" && sudo nginx -t && sudo systemctl reload nginx && echo "index.html no-cache block added and nginx reloaded"'

      - name: Ensure SPA fallback no-cache in Nginx
        run: |
          REMOTE="${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}"
          KEY="$HOME/.ssh/ec2_key"
          HAS=$(ssh -i "$KEY" -o StrictHostKeyChecking=no "$REMOTE" \
            'grep -c "no-cache.*must-revalidate" /etc/nginx/sites-available/thegist 2>/dev/null | tail -1 || echo 0')
          HAS=$(echo "$HAS" | tr -d '[:space:]')
          LOCATION_SLASH_OK=$(ssh -i "$KEY" -o StrictHostKeyChecking=no "$REMOTE" \
            'awk "/location \/ \{/{found=1} found && /must-revalidate/{print \"yes\"; exit}" /etc/nginx/sites-available/thegist || echo no')
          LOCATION_SLASH_OK=$(echo "$LOCATION_SLASH_OK" | tr -d '[:space:]')
          if [ "$LOCATION_SLASH_OK" = "yes" ]; then
            echo "location / already has no-cache headers — skipping"
            exit 0
          fi
          echo "Patching location / with no-cache headers..."
          ssh -i "$KEY" -o StrictHostKeyChecking=no "$REMOTE" \
            'CONF=/etc/nginx/sites-available/thegist && sudo sed -i "/location \/ {/,/}/{s|try_files \$uri \$uri/ /index.html;|try_files \$uri \$uri/ /index.html;\n        add_header Cache-Control \"no-cache, no-store, must-revalidate\" always;\n        add_header Pragma \"no-cache\" always;|}" "$CONF" && sudo nginx -t && sudo systemctl reload nginx && echo "location / no-cache patched and nginx reloaded"'

      - name: Ensure required env vars in server .env
        env:
          V_JWT: ${{ secrets.JWT_SECRET }}
          V_STEPPAY_TOKEN: ${{ secrets.STEPPAY_SECRET_TOKEN }}
          V_STEPPAY_PAY: ${{ secrets.STEPPAY_PAYMENT_KEY }}
          V_STEPPAY_WH: ${{ secrets.STEPPAY_WEBHOOK_SECRET }}
        run: |
          REMOTE="${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}"
          KEY="$HOME/.ssh/ec2_key"
          ssh -i "$KEY" -o StrictHostKeyChecking=no "$REMOTE" 'bash -s' << ENVEOF
            ENV_FILE="/var/www/thegist/.env"
            ensure_env() {
              local key="\$1" val="\$2"
              if [ -z "\$val" ]; then
                echo "SKIP (no value provided): \$key"
                return
              fi
              if grep -q "^\${key}=" "\$ENV_FILE" 2>/dev/null; then
                cur=\$(grep "^\${key}=" "\$ENV_FILE" | head -1 | cut -d= -f2-)
                if [ -z "\$cur" ]; then
                  sudo sed -i "s|^\${key}=.*|\${key}=\${val}|" "\$ENV_FILE"
                  echo "UPDATED (was empty): \$key"
                else
                  echo "OK (already set): \$key"
                fi
              else
                echo "\${key}=\${val}" | sudo tee -a "\$ENV_FILE" > /dev/null
                echo "ADDED: \$key"
              fi
            }
            ensure_env "JWT_SECRET"            "${V_JWT:-news-context-jwt-secret-key-2026}"
            ensure_env "STEPPAY_SECRET_TOKEN"   "${V_STEPPAY_TOKEN:-17cab52d68451a765eaacf90c2390d739a0e99b4849c01f139431f266b18ee5e}"
            ensure_env "STEPPAY_PAYMENT_KEY"    "${V_STEPPAY_PAY:-p9up7apk1o1jxh4z}"
            ensure_env "STEPPAY_WEBHOOK_SECRET" "${V_STEPPAY_WH:-ws_nzwk99oqjj121exh}"
          ENVEOF

      - name: Post-deploy tasks
        run: |
          REMOTE="${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}"
          KEY="$HOME/.ssh/ec2_key"
          ssh -i "$KEY" -o StrictHostKeyChecking=no "$REMOTE" "
            sudo chown -R www-data:www-data /var/www/thegist/
            sudo chmod -R 755 /var/www/thegist/
            sudo chmod -R 775 /var/www/thegist/storage/
            sudo ln -sf /var/www/thegist/storage /var/www/thegist/public/storage
            sudo systemctl restart php8.2-fpm
            echo 'Deploy complete: PHP-FPM restarted'
          "

      - name: Deployment notification
        run: |
          echo "Deployment completed successfully!"
          echo "Site URL: https://www.thegist.co.kr"

  # ========================================
  # 배포 후 검증 (실패 시 워크플로우 실패)
  # ========================================
  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      SITE_URL: https://www.thegist.co.kr

    steps:
      - name: Wait for deployment
        run: sleep 20

      # curl -w "%{http_code}"는 연결 실패 시에도 000을 stdout에 씀.
      # 여기에 || echo "000"을 붙이면 000000처럼 이어붙어 실패 메시지가 왜곡됨.
      - name: Health check (retries)
        run: |
          BASE="${{ env.SITE_URL }}"
          URL="$BASE/api/health"
          last=""
          for i in $(seq 1 12); do
            last=$(curl -sS -o /dev/null -w "%{http_code}" --connect-timeout 20 --max-time 45 "$URL" 2>/dev/null) || true
            last=$(echo "$last" | tr -d '[:space:]')
            if [ "$last" = "200" ]; then
              echo "✅ Health check passed (attempt $i): $URL"
              exit 0
            fi
            echo "Attempt $i/12: HTTP ${last:-<empty>} — retry in 15s..."
            sleep 15
          done
          echo "❌ Health check failed after 12 attempts. Last HTTP code: ${last:-none}"
          echo "--- curl -I (debug) ---"
          curl -sSI --connect-timeout 15 --max-time 30 "$URL" || true
          exit 1

      - name: Check homepage (retries)
        run: |
          URL="${{ env.SITE_URL }}/"
          last=""
          for i in $(seq 1 8); do
            last=$(curl -sS -o /dev/null -w "%{http_code}" --connect-timeout 20 --max-time 45 "$URL" 2>/dev/null) || true
            last=$(echo "$last" | tr -d '[:space:]')
            if [ "$last" = "200" ]; then
              echo "✅ Homepage OK (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/8: HTTP ${last:-<empty>} — retry in 10s..."
            sleep 10
          done
          echo "❌ Homepage failed. Last HTTP: ${last:-none}"
          curl -sSI --connect-timeout 15 --max-time 30 "$URL" || true
          exit 1

      - name: Verify index.html Cache-Control
        run: |
          URL="${{ env.SITE_URL }}/"
          echo "--- Response headers for index.html ---"
          HEADERS=$(curl -sSI --connect-timeout 15 --max-time 30 "$URL" 2>/dev/null || true)
          echo "$HEADERS"
          if echo "$HEADERS" | grep -qi "no-cache"; then
            echo "✅ index.html has no-cache header"
          else
            echo "⚠️ index.html may be missing no-cache header — check Nginx config"
          fi

      - name: Verify PWA manifest and Digital Asset Links
        run: |
          BASE="${{ env.SITE_URL }}"
          for path in /manifest.webmanifest /.well-known/assetlinks.json /sw.js; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" --connect-timeout 15 --max-time 30 "$BASE$path" 2>/dev/null || echo "000")
            code=$(echo "$code" | tr -d '[:space:]')
            if [ "$code" != "200" ]; then
              echo "❌ Expected 200 for $path, got HTTP $code"
              exit 1
            fi
            echo "✅ $path → HTTP $code"
          done

      - name: Verify Googlebot receives crawler HTML for /news/1 (SEO)
        run: |
          BASE="${{ env.SITE_URL }}"
          UA="Mozilla/5.0 (compatible; Googlebot/2.1; +http://www.google.com/bot.html)"
          tmp=$(mktemp)
          code=$(curl -sS -o "$tmp" -w "%{http_code}" --connect-timeout 25 --max-time 60 -A "$UA" "$BASE/news/1" 2>/dev/null || echo "000")
          code=$(echo "$code" | tr -d '[:space:]')
          echo "Googlebot GET /news/1 → HTTP $code"
          if [ "$code" = "404" ]; then
            echo "✅ 404 acceptable (no article or og-news-html 404 after deploy)"
            rm -f "$tmp"
            exit 0
          fi
          if [ "$code" != "200" ]; then
            echo "⚠️ Non-200/non-404 ($code) — nginx/앱 점검"
            rm -f "$tmp"
            exit 1
          fi
          if grep -q 'rel="canonical"' "$tmp"; then
            echo "✅ Crawler HTML includes rel=canonical (og-news-html path)"
            rm -f "$tmp"
            exit 0
          fi
          if grep -q 'og:title" content="the gist\."' "$tmp" 2>/dev/null; then
            echo "❌ Googlebot still gets generic SPA index — 443 블록에 thegist-server-locations.inc 와 동일 location 적용 필요"
            head -25 "$tmp"
            rm -f "$tmp"
            exit 1
          fi
          echo "✅ 200 without obvious SPA shell (non-/canonical page)"
          rm -f "$tmp"
