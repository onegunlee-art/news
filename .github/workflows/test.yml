name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ========================================
  # PHP Lint & Syntax Check
  # ========================================
  php-lint:
    name: PHP Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_mysql, curl, json, mbstring

      - name: PHP Syntax Check
        run: |
          errors=0
          while IFS= read -r file; do
            php -l "$file" > /dev/null 2>&1 || { echo "Syntax error in: $file"; errors=$((errors + 1)); }
          done < <(find . -name "*.php" -not -path "./vendor/*")
          
          if [ $errors -gt 0 ]; then
            echo "Found $errors files with syntax errors"
            exit 1
          fi
          echo "All PHP files have valid syntax"

      - name: EDU smoke test (news pipeline isolation)
        run: php tests/edu_smoke_test.php

      - name: EDU compose bootstrap require (static)
        run: php tools/edu_compose_bootstrap_require_test.php

      - name: EDU compose bootstrap gate self-test
        run: php tools/edu_compose_bootstrap_gate_self_test.php

      - name: EDU coach gauge XP static test (B-2)
        run: php tools/edu_coach_gauge_static_test.php

      - name: EDU coach level-up static test (B-3)
        run: php tools/edu_coach_levelup_static_test.php

      - name: EDU quest filter static test (Step 1)
        run: php tools/edu_quest_filter_static_test.php

      - name: EDU quest generate static test (Step 2)
        run: php tools/edu_quest_generate_static_test.php

      - name: EDU home board static test (Phase 1)
        run: php tools/edu_home_board_static_test.php

      - name: EDU quest combo static test (Phase 2)
        run: php tools/edu_quest_combo_static_test.php

      - name: EDU brand refresh static test
        run: php tools/edu_brand_refresh_static_test.php

      - name: EDU parent report static test
        run: php tools/edu_parent_report_static_test.php

      - name: EDU admin account static test
        run: php tools/edu_admin_account_static_test.php

  # ========================================
  # TypeScript Type Check
  # ========================================
  typescript-check:
    name: TypeScript Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        working-directory: src/frontend
        run: npm ci

      - name: TypeScript check
        working-directory: src/frontend
        run: npx tsc --noEmit

  # ========================================
  # ESLint
  # ========================================
  eslint:
    name: ESLint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Run ESLint
        working-directory: src/frontend
        run: npm run lint

  # ========================================
  # Build Test
  # ========================================
  build-test:
    name: Build Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Build
        working-directory: src/frontend
        run: npm run build
        env:
          VITE_API_URL: /api
